        - cell "Producto B"
        - cell "$34.50"
        - cell "2"
        - cell "Eliminar":
          - button "Eliminar"
  - paragraph: "Total: $88.99"
  - button "Finalizar compra"
- contentinfo:
  - paragraph: © 2024 Tienda Demo — Sitio de práctica para automatización de pruebas