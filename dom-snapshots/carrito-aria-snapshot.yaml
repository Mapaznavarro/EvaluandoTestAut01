- banner:
  - heading "Tienda Demo" [level=1]
  - navigation:
    - link "Inicio":
      - /url: index.html
    - link "Iniciar sesión":
      - /url: login.html
    - link "Carrito (0)":
      - /url: carrito.html
- main:
  - heading "Tu carrito" [level=2]
  - table "Productos en el carrito":
    - rowgroup:
      - row "Producto Precio Cantidad Acciones":
        - columnheader "Producto"
        - columnheader "Precio"
        - columnheader "Cantidad"
        - columnheader "Acciones"
    - rowgroup:
      - row "Producto A $19.99 1 Eliminar":
        - cell "Producto A"
        - cell "$19.99"
        - cell "1"
